name: E2E npm package multi-node

on:
  workflow_dispatch:
  workflow_run:
    workflows: [Release]
    types: [completed]

permissions:
  contents: read
  packages: read

jobs:
  e2e-npm:
    name: E2E - npm package two-node sync
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Install build tools for native modules
        run: sudo apt-get install -y python3 make g++ 2>/dev/null || true

      - name: Install filesync-kubo from GitHub Packages
        run: |
          npm config set @smellgamed3:registry https://npm.pkg.github.com
          npm config set //npm.pkg.github.com/:_authToken ${{ secrets.GITHUB_TOKEN }}
          npm install -g @smellgamed3/filesync-kubo
          which filesync-kubo

      - name: Create Docker network for Kubo
        run: docker network create kubo-net

      - name: Start and configure Kubo A
        run: |
          docker run -d --name kubo-a --network kubo-net -p 5001:5001 ipfs/kubo:latest
          for i in $(seq 1 30); do
            sleep 2
            docker exec kubo-a ipfs id >/dev/null 2>&1 && echo "kubo-a init ready" && break || echo "  kubo-a init $i/30..."
          done
          docker exec kubo-a ipfs config --bool Pubsub.Enabled true
          docker exec kubo-a ipfs config Addresses.API "/ip4/0.0.0.0/tcp/5001"
          docker restart kubo-a
          for i in $(seq 1 30); do
            sleep 2
            curl -fsS -X POST http://127.0.0.1:5001/api/v0/id >/dev/null 2>&1 && echo "kubo-a API ready" && break || echo "  kubo-a api $i/30..."
          done
          PEER_A=$(curl -s -X POST http://127.0.0.1:5001/api/v0/id | python3 -c "import sys,json; print(json.load(sys.stdin)['ID'])")
          echo "PEER_A=$PEER_A" >> "$GITHUB_ENV"
          echo "kubo-a peer: $PEER_A"

      - name: Start and configure Kubo B
        run: |
          docker run -d --name kubo-b --network kubo-net -p 5002:5001 ipfs/kubo:latest
          for i in $(seq 1 30); do
            sleep 2
            docker exec kubo-b ipfs id >/dev/null 2>&1 && echo "kubo-b init ready" && break || echo "  kubo-b init $i/30..."
          done
          docker exec kubo-b ipfs config --bool Pubsub.Enabled true
          docker exec kubo-b ipfs config Addresses.API "/ip4/0.0.0.0/tcp/5001"
          docker restart kubo-b
          for i in $(seq 1 30); do
            sleep 2
            curl -fsS -X POST http://127.0.0.1:5002/api/v0/id >/dev/null 2>&1 && echo "kubo-b API ready" && break || echo "  kubo-b api $i/30..."
          done
          PEER_B=$(curl -s -X POST http://127.0.0.1:5002/api/v0/id | python3 -c "import sys,json; print(json.load(sys.stdin)['ID'])")
          echo "PEER_B=$PEER_B" >> "$GITHUB_ENV"
          echo "kubo-b peer: $PEER_B"

      - name: Connect Kubo nodes via swarm
        run: |
          docker exec kubo-a ipfs swarm connect "/dns4/kubo-b/tcp/4001/p2p/$PEER_B" || true
          docker exec kubo-b ipfs swarm connect "/dns4/kubo-a/tcp/4001/p2p/$PEER_A" || true
          sleep 3
          echo "kubo-a swarm peers: $(docker exec kubo-a ipfs swarm peers 2>/dev/null | wc -l)"

      - name: Prepare filesync config and data dirs
        run: |
          mkdir -p /tmp/e2e/home-a /tmp/e2e/home-b /tmp/e2e/data-a /tmp/e2e/data-b
          KEY="e2esharedencryptionkeyfortesting01"
          SFOLDER_A='"syncFolders":[{"id":"sf","syncId":"e2e-sync","localPath":"/tmp/e2e/data-a","historyCount":5,"encrypt":true}]'
          SFOLDER_B='"syncFolders":[{"id":"sf","syncId":"e2e-sync","localPath":"/tmp/e2e/data-b","historyCount":5,"encrypt":true}]'
          WAUTH='"webAuth":{"username":"","passwordHash":""}'
          printf '{%s,"name":"node-a","webPort":18384,"encryptionKey":"%s",%s}' "$WAUTH" "$KEY" "$SFOLDER_A" > /tmp/e2e/home-a/config.json
          printf '{%s,"name":"node-b","webPort":28384,"encryptionKey":"%s",%s}' "$WAUTH" "$KEY" "$SFOLDER_B" > /tmp/e2e/home-b/config.json
          echo "Config A: $(cat /tmp/e2e/home-a/config.json)"
          echo "Config B: $(cat /tmp/e2e/home-b/config.json)"

      - name: Start filesync nodes (background)
        run: |
          FILESYNC_HOME=/tmp/e2e/home-a FILESYNC_HOST=0.0.0.0 IPFS_API=http://127.0.0.1:5001/api/v0 FILESYNC_DEV_AUTO_TRUST=true \
            nohup filesync-kubo >/tmp/e2e/node-a.log 2>&1 </dev/null &
          echo $! > /tmp/e2e/node-a.pid
          FILESYNC_HOME=/tmp/e2e/home-b FILESYNC_HOST=0.0.0.0 IPFS_API=http://127.0.0.1:5002/api/v0 FILESYNC_DEV_AUTO_TRUST=true \
            nohup filesync-kubo >/tmp/e2e/node-b.log 2>&1 </dev/null &
          echo $! > /tmp/e2e/node-b.pid
          echo "filesync-a PID: $(cat /tmp/e2e/node-a.pid)"
          echo "filesync-b PID: $(cat /tmp/e2e/node-b.pid)"

      - name: Wait for filesync nodes to be ready
        run: |
          for i in $(seq 1 30); do
            sleep 2
            curl -fsS http://127.0.0.1:18384/api/status >/dev/null 2>&1 && echo "node-a API ready" && break || echo "  node-a $i/30..."
          done
          curl -fsS http://127.0.0.1:18384/api/status || { echo "FAIL: node-a not ready"; cat /tmp/e2e/node-a.log; exit 1; }
          for i in $(seq 1 30); do
            sleep 2
            curl -fsS http://127.0.0.1:28384/api/status >/dev/null 2>&1 && echo "node-b API ready" && break || echo "  node-b $i/30..."
          done
          curl -fsS http://127.0.0.1:28384/api/status || { echo "FAIL: node-b not ready"; cat /tmp/e2e/node-b.log; exit 1; }

      - name: Wait for peer discovery and auto-trust
        run: |
          echo "Waiting 30s for pubsub announce and auto-trust exchange..."
          sleep 30
          echo "Node A log tail:"
          tail -20 /tmp/e2e/node-a.log || true
          echo "Node B log tail:"
          tail -20 /tmp/e2e/node-b.log || true
          echo "Node A peers: $(curl -fsS http://127.0.0.1:18384/api/nodes)"
          echo "Node B peers: $(curl -fsS http://127.0.0.1:28384/api/nodes)"

      - name: "Test 1 - A to B file sync"
        run: |
          echo "hello from node A at $(date -u)" > /tmp/e2e/data-a/test-file.txt
          SYNCED=false
          for i in $(seq 1 20); do
            sleep 3
            CONTENT=$(cat /tmp/e2e/data-b/test-file.txt 2>/dev/null || true)
            if echo "$CONTENT" | grep -q "hello from node A"; then
              echo "PASS: A-to-B sync ok: $CONTENT"
              SYNCED=true
              break
            fi
            echo "  waiting $i/20..."
          done
          $SYNCED || { echo "FAIL: A-to-B sync failed"; cat /tmp/e2e/node-a.log; cat /tmp/e2e/node-b.log; exit 1; }

      - name: "Test 2 - B to A reverse sync"
        run: |
          echo "hello from node B at $(date -u)" > /tmp/e2e/data-b/from-b.txt
          SYNCED=false
          for i in $(seq 1 20); do
            sleep 3
            CONTENT=$(cat /tmp/e2e/data-a/from-b.txt 2>/dev/null || true)
            if echo "$CONTENT" | grep -q "hello from node B"; then
              echo "PASS: B-to-A reverse sync ok: $CONTENT"
              SYNCED=true
              break
            fi
            echo "  waiting $i/20..."
          done
          $SYNCED || { echo "FAIL: B-to-A reverse sync failed"; exit 1; }

      - name: "Test 3 - Update sync (overwrite)"
        run: |
          echo "updated by node A at $(date -u)" > /tmp/e2e/data-a/test-file.txt
          SYNCED=false
          for i in $(seq 1 20); do
            sleep 3
            CONTENT=$(cat /tmp/e2e/data-b/test-file.txt 2>/dev/null || true)
            if echo "$CONTENT" | grep -q "updated by node A"; then
              echo "PASS: update sync ok: $CONTENT"
              SYNCED=true
              break
            fi
            echo "  waiting $i/20..."
          done
          $SYNCED || { echo "FAIL: update sync failed"; exit 1; }

      - name: "Test 4 - Delete sync"
        run: |
          rm /tmp/e2e/data-a/test-file.txt
          DELETED=false
          for i in $(seq 1 20); do
            sleep 3
            if [ ! -f /tmp/e2e/data-b/test-file.txt ]; then
              echo "PASS: delete sync ok"
              DELETED=true
              break
            fi
            echo "  waiting for delete $i/20..."
          done
          $DELETED || { echo "FAIL: delete sync failed"; exit 1; }

      - name: "Test 5 - Multiple file backfill"
        run: |
          echo "backfill-1" > /tmp/e2e/data-a/bf-1.txt
          echo "backfill-2" > /tmp/e2e/data-a/bf-2.txt
          echo "backfill-3" > /tmp/e2e/data-a/bf-3.txt
          SYNCED=false
          for i in $(seq 1 20); do
            sleep 3
            B1=$(cat /tmp/e2e/data-b/bf-1.txt 2>/dev/null || true)
            B2=$(cat /tmp/e2e/data-b/bf-2.txt 2>/dev/null || true)
            B3=$(cat /tmp/e2e/data-b/bf-3.txt 2>/dev/null || true)
            if [ "$B1" = "backfill-1" ] && [ "$B2" = "backfill-2" ] && [ "$B3" = "backfill-3" ]; then
              echo "PASS: all 3 backfill files synced"
              SYNCED=true
              break
            fi
            echo "  waiting $i/20... B1='$B1' B2='$B2' B3='$B3'"
          done
          $SYNCED || { echo "FAIL: backfill sync incomplete"; exit 1; }

      - name: "Test 6 - API verification"
        run: |
          STATUS_A=$(curl -fsS http://127.0.0.1:18384/api/status)
          STATUS_B=$(curl -fsS http://127.0.0.1:28384/api/status)
          echo "Node A: $STATUS_A"
          echo "Node B: $STATUS_B"
          echo "$STATUS_A" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['ok']; print('PASS: node A ok')"
          echo "$STATUS_B" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['ok']; print('PASS: node B ok')"
          NODES_A=$(curl -fsS http://127.0.0.1:18384/api/nodes)
          echo "Peers: $NODES_A"
          echo "$NODES_A" | python3 -c "import sys,json; n=json.load(sys.stdin); assert len(n)>0,'no peers discovered'; print('PASS: node A sees',len(n),'peer(s)')"
          FILES_A=$(curl -fsS http://127.0.0.1:18384/api/files)
          echo "$FILES_A" | python3 -c "import sys,json; f=json.load(sys.stdin); assert len(f)>0,'no files indexed'; print('PASS: node A has',len(f),'file(s)')"
          echo "$FILES_A" | python3 -c "import sys,json; f=json.load(sys.stdin); assert any(x.get('syncId')=='e2e-sync' for x in f); print('PASS: syncId correct')"
          curl -fsS http://127.0.0.1:18384/ui | grep -q "FileSync" && echo "PASS: web UI responds"

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== node-a.log ===" && cat /tmp/e2e/node-a.log || true
          echo "=== node-b.log ===" && cat /tmp/e2e/node-b.log || true
          echo "=== kubo-a logs ===" && docker logs kubo-a 2>&1 | tail -20 || true
          echo "=== kubo-b logs ===" && docker logs kubo-b 2>&1 | tail -20 || true
          echo "=== data-a ===" && ls -la /tmp/e2e/data-a/ || true
          echo "=== data-b ===" && ls -la /tmp/e2e/data-b/ || true

      - name: Cleanup
        if: always()
        run: |
          kill $(cat /tmp/e2e/node-a.pid 2>/dev/null) 2>/dev/null || true
          kill $(cat /tmp/e2e/node-b.pid 2>/dev/null) 2>/dev/null || true
          docker rm -f kubo-a kubo-b 2>/dev/null || true
          docker network rm kubo-net 2>/dev/null || true
          rm -rf /tmp/e2e