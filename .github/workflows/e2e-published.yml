name: E2E Published Artifacts

# 触发条件：手动触发，或 Release 工作流成功后自动触发
on:
  workflow_dispatch:
  workflow_run:
    workflows: [Release]
    types: [completed]

permissions:
  contents: read
  packages: read

jobs:
  e2e:
    name: E2E – GHCR image + npm package multi-node sync
    runs-on: ubuntu-latest
    # 仅在手动触发或 Release 成功后运行
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      # ─────────────────────────────────────────
      # 1. 登录 GHCR，拉取已发布镜像
      # ─────────────────────────────────────────
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull published FileSync image
        run: |
          docker pull ghcr.io/smellgamed3/filesync-kubo:latest
          echo "Image pulled: $(docker inspect --format='{{.RepoDigests}}' ghcr.io/smellgamed3/filesync-kubo:latest)"

      # ─────────────────────────────────────────
      # 2. 建立测试 Docker 网络
      # ─────────────────────────────────────────
      - name: Create Docker network
        run: docker network create filesync-e2e

      # ─────────────────────────────────────────
      # 3. 启动并配置 Kubo 节点 A
      # ─────────────────────────────────────────
      - name: Start Kubo A
        run: |
          docker run -d --name kubo-a --network filesync-e2e ipfs/kubo:latest
          echo "Waiting for kubo-a to initialize..."
          for i in $(seq 1 30); do
            sleep 2
            docker exec kubo-a ipfs id &>/dev/null && echo "kubo-a ready" && break
            echo "  attempt $i/30..."
          done
          # 启用 PubSub，将 API 绑定到所有接口
          docker exec kubo-a ipfs config --bool Pubsub.Enabled true
          docker exec kubo-a ipfs config Addresses.API "/ip4/0.0.0.0/tcp/5001"
          docker restart kubo-a
          for i in $(seq 1 30); do
            sleep 2
            docker exec kubo-a ipfs id &>/dev/null && echo "kubo-a restarted" && break
            echo "  restart attempt $i/30..."
          done
          PEER_A=$(docker exec kubo-a ipfs id --encoding=json | python3 -c "import sys,json; print(json.load(sys.stdin)['ID'])")
          echo "PEER_A=$PEER_A" >> "$GITHUB_ENV"
          echo "kubo-a peer ID: $PEER_A"

      # ─────────────────────────────────────────
      # 4. 启动并配置 Kubo 节点 B
      # ─────────────────────────────────────────
      - name: Start Kubo B
        run: |
          docker run -d --name kubo-b --network filesync-e2e ipfs/kubo:latest
          echo "Waiting for kubo-b to initialize..."
          for i in $(seq 1 30); do
            sleep 2
            docker exec kubo-b ipfs id &>/dev/null && echo "kubo-b ready" && break
            echo "  attempt $i/30..."
          done
          docker exec kubo-b ipfs config --bool Pubsub.Enabled true
          docker exec kubo-b ipfs config Addresses.API "/ip4/0.0.0.0/tcp/5001"
          docker restart kubo-b
          for i in $(seq 1 30); do
            sleep 2
            docker exec kubo-b ipfs id &>/dev/null && echo "kubo-b restarted" && break
            echo "  restart attempt $i/30..."
          done
          PEER_B=$(docker exec kubo-b ipfs id --encoding=json | python3 -c "import sys,json; print(json.load(sys.stdin)['ID'])")
          echo "PEER_B=$PEER_B" >> "$GITHUB_ENV"
          echo "kubo-b peer ID: $PEER_B"

      # ─────────────────────────────────────────
      # 5. 将两个 Kubo 节点互相引导，建立 swarm 连接
      # ─────────────────────────────────────────
      - name: Bootstrap Kubo nodes together
        run: |
          echo "Bootstrapping: kubo-a ↔ kubo-b"
          docker exec kubo-a ipfs swarm connect "/dns4/kubo-b/tcp/4001/p2p/$PEER_B" || true
          docker exec kubo-b ipfs swarm connect "/dns4/kubo-a/tcp/4001/p2p/$PEER_A" || true
          sleep 3
          echo "kubo-a swarm peers: $(docker exec kubo-a ipfs swarm peers 2>/dev/null | wc -l) peers"
          echo "kubo-b swarm peers: $(docker exec kubo-b ipfs swarm peers 2>/dev/null | wc -l) peers"

      # ─────────────────────────────────────────
      # 6. 创建各节点配置目录和同步数据目录
      # ─────────────────────────────────────────
      - name: Prepare config and data directories
        run: |
          mkdir -p /tmp/e2e/{config-a,config-b,data-a,data-b}
          # 给容器内的 app 用户（UID 不同于 GHA runner）写权限
          chmod 777 /tmp/e2e/config-a /tmp/e2e/config-b /tmp/e2e/data-a /tmp/e2e/data-b
          # 两个节点使用相同加密密钥，保证跨节点解密可用
          E2E_KEY="e2e-shared-encryption-key-for-testing-only"

          cat >/tmp/e2e/config-a/config.json <<'JSONEOF'
{
  "name": "node-a",
  "webPort": 8384,
  "webAuth": { "username": "", "passwordHash": "" },
  "encryptionKey": "e2e-shared-encryption-key-for-testing-only",
  "syncFolders": [
    {
      "id": "e2e-folder",
      "syncId": "e2e-test-sync",
      "localPath": "/data",
      "historyCount": 5,
      "encrypt": true
    }
  ]
}
JSONEOF

          cat >/tmp/e2e/config-b/config.json <<'JSONEOF'
{
  "name": "node-b",
  "webPort": 8384,
  "webAuth": { "username": "", "passwordHash": "" },
  "encryptionKey": "e2e-shared-encryption-key-for-testing-only",
  "syncFolders": [
    {
      "id": "e2e-folder",
      "syncId": "e2e-test-sync",
      "localPath": "/data",
      "historyCount": 5,
      "encrypt": true
    }
  ]
}
JSONEOF
          echo "Config files created:"
          cat /tmp/e2e/config-a/config.json

      # ─────────────────────────────────────────
      # 7. 启动 FileSync 节点 A（使用 GHCR 已发布镜像）
      # ─────────────────────────────────────────
      - name: Start FileSync node A
        run: |
          docker run -d --name filesync-a \
            --network filesync-e2e \
            -p 18384:8384 \
            -v /tmp/e2e/config-a:/app/.filesync \
            -v /tmp/e2e/data-a:/data \
            -e FILESYNC_HOST=0.0.0.0 \
            -e IPFS_API=http://kubo-a:5001/api/v0 \
            -e FILESYNC_DEV_AUTO_TRUST=true \
            ghcr.io/smellgamed3/filesync-kubo:latest
          echo "FileSync node A started"

      # ─────────────────────────────────────────
      # 8. 启动 FileSync 节点 B（使用 GHCR 已发布镜像）
      # ─────────────────────────────────────────
      - name: Start FileSync node B
        run: |
          docker run -d --name filesync-b \
            --network filesync-e2e \
            -p 28384:8384 \
            -v /tmp/e2e/config-b:/app/.filesync \
            -v /tmp/e2e/data-b:/data \
            -e FILESYNC_HOST=0.0.0.0 \
            -e IPFS_API=http://kubo-b:5001/api/v0 \
            -e FILESYNC_DEV_AUTO_TRUST=true \
            ghcr.io/smellgamed3/filesync-kubo:latest
          echo "FileSync node B started"

      # 短暂等待后检查容器是否存活
      - name: Check containers are running
        run: |
          sleep 4
          docker ps -a --filter "name=filesync"
          echo "=== filesync-a early logs ==="
          docker logs filesync-a 2>&1 || true
          echo "=== filesync-b early logs ==="
          docker logs filesync-b 2>&1 || true

      # ─────────────────────────────────────────
      # 9. 等待两个 FileSync 节点 HTTP API 就绪
      # ─────────────────────────────────────────
      - name: Wait for FileSync nodes to be ready
        run: |
          echo "Waiting for node A API..."
          for i in $(seq 1 30); do
            sleep 2
            if curl -fsS http://127.0.0.1:18384/api/status >/dev/null 2>&1; then
              echo "✅ Node A API ready"
              break
            fi
            echo "  attempt $i/30..."
          done
          curl -fsS http://127.0.0.1:18384/api/status || { echo "❌ Node A not ready"; docker logs filesync-a; exit 1; }

          echo "Waiting for node B API..."
          for i in $(seq 1 30); do
            sleep 2
            if curl -fsS http://127.0.0.1:28384/api/status >/dev/null 2>&1; then
              echo "✅ Node B API ready"
              break
            fi
            echo "  attempt $i/30..."
          done
          curl -fsS http://127.0.0.1:28384/api/status || { echo "❌ Node B not ready"; docker logs filesync-b; exit 1; }

      # ─────────────────────────────────────────
      # 10. 等待节点互相发现并建立自动信任
      # ─────────────────────────────────────────
      - name: Wait for peer discovery and mutual auto-trust
        run: |
          echo "Waiting 25s for PubSub announcement and auto-trust exchange..."
          sleep 25
          echo "Node A status: $(curl -fsS http://127.0.0.1:18384/api/status)"
          echo "Node B status: $(curl -fsS http://127.0.0.1:28384/api/status)"
          echo "Node A peers: $(curl -fsS http://127.0.0.1:18384/api/nodes)"
          echo "Node B peers: $(curl -fsS http://127.0.0.1:28384/api/nodes)"

      # ─────────────────────────────────────────
      # 测试 1：节点 A 发文件 → 节点 B 同步接收
      # ─────────────────────────────────────────
      - name: "Test 1: A→B file sync"
        run: |
          echo "hello from node A at $(date -u)" > /tmp/e2e/data-a/sync-test.txt
          echo "Wrote sync-test.txt to node A data dir"

          SYNCED=false
          for i in $(seq 1 20); do
            sleep 3
            CONTENT=$(cat /tmp/e2e/data-b/sync-test.txt 2>/dev/null || true)
            if echo "$CONTENT" | grep -q "hello from node A"; then
              echo "✅ Test 1 PASSED – file synced to node B: $CONTENT"
              SYNCED=true
              break
            fi
            echo "  Waiting for sync ($i/20)..."
          done
          $SYNCED || {
            echo "❌ Test 1 FAILED – file not synced"
            echo "Node A files API: $(curl -fsS http://127.0.0.1:18384/api/files || true)"
            echo "Node B files API: $(curl -fsS http://127.0.0.1:28384/api/files || true)"
            docker logs filesync-a
            docker logs filesync-b
            exit 1
          }

      # ─────────────────────────────────────────
      # 测试 2：节点 B 发文件 → 节点 A 反向同步
      # ─────────────────────────────────────────
      - name: "Test 2: B→A reverse sync"
        run: |
          echo "hello from node B at $(date -u)" > /tmp/e2e/data-b/from-b.txt
          echo "Wrote from-b.txt to node B data dir"

          SYNCED=false
          for i in $(seq 1 20); do
            sleep 3
            CONTENT=$(cat /tmp/e2e/data-a/from-b.txt 2>/dev/null || true)
            if echo "$CONTENT" | grep -q "hello from node B"; then
              echo "✅ Test 2 PASSED – reverse sync to node A: $CONTENT"
              SYNCED=true
              break
            fi
            echo "  Waiting for reverse sync ($i/20)..."
          done
          $SYNCED || { echo "❌ Test 2 FAILED – reverse sync failed"; exit 1; }

      # ─────────────────────────────────────────
      # 测试 3：覆盖更新，验证版本更新同步
      # ─────────────────────────────────────────
      - name: "Test 3: Update sync (overwrite)"
        run: |
          echo "updated content from node A" > /tmp/e2e/data-a/sync-test.txt
          echo "Overwrote sync-test.txt on node A"

          SYNCED=false
          for i in $(seq 1 20); do
            sleep 3
            CONTENT=$(cat /tmp/e2e/data-b/sync-test.txt 2>/dev/null || true)
            if echo "$CONTENT" | grep -q "updated content"; then
              echo "✅ Test 3 PASSED – update synced: $CONTENT"
              SYNCED=true
              break
            fi
            echo "  Waiting for update sync ($i/20)..."
          done
          $SYNCED || { echo "❌ Test 3 FAILED – update sync failed"; exit 1; }

      # ─────────────────────────────────────────
      # 测试 4：删除同步
      # ─────────────────────────────────────────
      - name: "Test 4: Delete sync"
        run: |
          rm /tmp/e2e/data-a/sync-test.txt
          echo "Deleted sync-test.txt from node A"

          DELETED=false
          for i in $(seq 1 20); do
            sleep 3
            if [ ! -f /tmp/e2e/data-b/sync-test.txt ]; then
              echo "✅ Test 4 PASSED – delete synced to node B"
              DELETED=true
              break
            fi
            echo "  Waiting for delete sync ($i/20)..."
          done
          $DELETED || { echo "❌ Test 4 FAILED – delete sync failed"; exit 1; }

      # ─────────────────────────────────────────
      # 测试 5：状态补全（state sync backfill）
      # 先写入文件，再触发 state sync，验证新节点能补全历史
      # ─────────────────────────────────────────
      - name: "Test 5: State sync backfill verification"
        run: |
          # 写入多个文件
          echo "backfill-1" > /tmp/e2e/data-a/backfill-1.txt
          echo "backfill-2" > /tmp/e2e/data-a/backfill-2.txt
          echo "backfill-3" > /tmp/e2e/data-a/backfill-3.txt
          echo "Wrote 3 backfill files to node A"

          SYNCED=false
          for i in $(seq 1 20); do
            sleep 3
            B1=$(cat /tmp/e2e/data-b/backfill-1.txt 2>/dev/null || true)
            B2=$(cat /tmp/e2e/data-b/backfill-2.txt 2>/dev/null || true)
            B3=$(cat /tmp/e2e/data-b/backfill-3.txt 2>/dev/null || true)
            if [ "$B1" = "backfill-1" ] && [ "$B2" = "backfill-2" ] && [ "$B3" = "backfill-3" ]; then
              echo "✅ Test 5 PASSED – all 3 backfill files synced"
              SYNCED=true
              break
            fi
            echo "  Waiting for backfill sync ($i/20)... B1='$B1' B2='$B2' B3='$B3'"
          done
          $SYNCED || { echo "❌ Test 5 FAILED – backfill sync incomplete"; exit 1; }

      # ─────────────────────────────────────────
      # 测试 6：API 端点功能验证
      # ─────────────────────────────────────────
      - name: "Test 6: API endpoints verification"
        run: |
          echo "=== Node A /api/status ==="
          STATUS_A=$(curl -fsS http://127.0.0.1:18384/api/status)
          echo "$STATUS_A"
          echo "$STATUS_A" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['ok']==True, 'ok!=true'; print('✅ Node A status OK')"

          echo "=== Node B /api/status ==="
          STATUS_B=$(curl -fsS http://127.0.0.1:28384/api/status)
          echo "$STATUS_B"
          echo "$STATUS_B" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['ok']==True, 'ok!=true'; print('✅ Node B status OK')"

          echo "=== Node A /api/nodes ==="
          NODES_A=$(curl -fsS http://127.0.0.1:18384/api/nodes)
          echo "$NODES_A"
          echo "$NODES_A" | python3 -c "import sys,json; nodes=json.load(sys.stdin); assert any(n.get('node_id','').startswith('12D') or 'node-b' in n.get('name','') for n in nodes), f'node-b not found in {nodes}'; print('✅ Node A sees node B')"

          echo "=== Node A /api/files ==="
          FILES_A=$(curl -fsS http://127.0.0.1:18384/api/files)
          echo "$FILES_A"
          echo "$FILES_A" | python3 -c "import sys,json; files=json.load(sys.stdin); assert len(files)>0, 'no files indexed'; print(f'✅ Node A has {len(files)} indexed files')"

          echo "=== Node A /api/folders ==="
          FOLDERS_A=$(curl -fsS http://127.0.0.1:18384/api/folders)
          echo "$FOLDERS_A"
          echo "$FOLDERS_A" | python3 -c "import sys,json; f=json.load(sys.stdin); assert any(x.get('syncId')=='e2e-test-sync' for x in f), 'syncId not found'; print('✅ Sync folder config correct')"

          echo "=== Node A /ui (HTML) ==="
          curl -fsS http://127.0.0.1:18384/ui | grep -q "FileSync" && echo "✅ Web UI responds"

      # ─────────────────────────────────────────
      # 测试 7：从 GitHub Packages 安装 npm 包，验证 CLI 功能
      # ─────────────────────────────────────────
      - name: "Test 7: npm package install from GitHub Packages"
        run: |
          npm config set @smellgamed3:registry https://npm.pkg.github.com
          npm config set //npm.pkg.github.com/:_authToken ${{ secrets.GITHUB_TOKEN }}
          npm install -g @smellgamed3/filesync-kubo
          echo "✅ @smellgamed3/filesync-kubo installed from GitHub Packages"
          which filesync-kubo

          # 启动 CLI 验证配置文件自动生成、API 可访问
          FILESYNC_HOME=/tmp/npm-test-home FILESYNC_HOST=0.0.0.0 timeout 5 filesync-kubo || true
          [ -f /tmp/npm-test-home/config.json ] \
            && echo "✅ CLI creates config.json on first run" \
            || echo "⚠ Config file not found – may be timing issue"

      # ─────────────────────────────────────────
      # 失败时收集所有容器日志
      # ─────────────────────────────────────────
      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== kubo-a logs ===" && docker logs kubo-a 2>&1 | tail -40 || true
          echo "=== kubo-b logs ===" && docker logs kubo-b 2>&1 | tail -40 || true
          echo "=== filesync-a logs ===" && docker logs filesync-a 2>&1 || true
          echo "=== filesync-b logs ===" && docker logs filesync-b 2>&1 || true
          echo "=== data-a contents ===" && ls -la /tmp/e2e/data-a/ 2>/dev/null || true
          echo "=== data-b contents ===" && ls -la /tmp/e2e/data-b/ 2>/dev/null || true
          echo "=== node A nodes API ===" && curl -fsS http://127.0.0.1:18384/api/nodes 2>/dev/null || true
          echo "=== node B nodes API ===" && curl -fsS http://127.0.0.1:28384/api/nodes 2>/dev/null || true

      # ─────────────────────────────────────────
      # 清理
      # ─────────────────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          docker rm -f kubo-a kubo-b filesync-a filesync-b 2>/dev/null || true
          docker network rm filesync-e2e 2>/dev/null || true
          rm -rf /tmp/e2e /tmp/npm-test-home
